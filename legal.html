<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Apps Legal Documentation</title>
    <style>
        :root {
            --bg-color: #0A0614;
            --surface-color: #160D2E;
            --primary-color: #B57BFF;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            padding: 60px 24px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        .header h1 {
            font-size: 36px;
            font-weight: 300;
            margin: 0 0 16px 0;
            letter-spacing: -0.5px;
        }
        .header p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin: 0;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        .app-card {
            background-color: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 30px rgba(181, 123, 255, 0.1);
        }
        .app-card h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 400;
            color: var(--primary-color);
        }
        .app-card p {
            margin: 0 0 24px 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            flex-grow: 1;
        }
        .card-footer {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }
        .card-footer::after {
            content: '→';
            margin-left: 8px;
            font-size: 16px;
            transition: margin-left 0.3s ease;
        }
        .app-card:hover .card-footer::after {
            margin-left: 14px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Our Apps Legal Documentation</h1>
            <p>Select an application below to view its specific Privacy Policy and Terms of Service.</p>
        </header>

        <div class="app-grid">
            <a href="auric-legal.html" class="app-card">
                <h2>Auric</h2>
                <p>Mindfulness, breathing, and relaxation companion. View terms regarding medical disclaimers, leaderboard data, and local notifications.</p>
                <div class="card-footer">View Documents</div>
            </a>
            
            </div>
    </div>
</body>
</html>
